<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCheck | Modern Weather Hub</title>
    <meta name="description" content="Get real-time weather updates with SkyCheck. Premium glassmorphism weather dashboard.">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loader -->
    <div id="loader"></div>

    <header>
        <div class="logo">SkyCheck</div>
        <div class="search-container">
            <div class="search-bar glass-effect">
                <input type="text" id="cityInput" placeholder="Search for a city...">
                <button id="searchBtn" title="Search"><i class="fas fa-search"></i></button>
                <button id="geoBtn" class="gps-btn" title="Use My Location"><i class="fas fa-location-crosshairs"></i></button>
            </div>
        </div>
    </header>

    <main id="weatherContent">
        <!-- Main Weather Hero -->
        <section class="hero-section fade-in">
            <div class="city-info">
                <h1 id="cityName">---</h1>
                <p id="dateTime">---</p>
            </div>

            <div class="weather-main">
                <div id="weatherIconLarge" class="weather-icon-large">
                    <!-- Meteocon will be injected here -->
                </div>
                <div class="temp-container">
                    <div class="temperature">
                        <span id="tempValue">--</span>
                        <span id="unitToggle" class="unit-toggle" title="Switch Unit">°C</span>
                    </div>
                    <p class="condition-text" id="conditionText">---</p>
                    <p class="feels-like">Feels Like: <span id="feelsLike">--°</span></p>
                </div>
            </div>
        </section>

        <!-- Weather Details Grid -->
        <section class="details-grid fade-in">
            <div class="detail-card glass-effect">
                <div class="detail-icon"><i class="fas fa-droplet"></i></div>
                <div class="detail-info">
                    <h3>Humidity</h3>
                    <p id="humidity">--%</p>
                </div>
            </div>
            <div class="detail-card glass-effect">
                <div class="detail-icon"><i class="fas fa-wind"></i></div>
                <div class="detail-info">
                    <h3>Wind Speed</h3>
                    <p id="windSpeed">-- km/h</p>
                </div>
            </div>
            <div class="detail-card glass-effect">
                <div class="detail-icon"><i class="fas fa-eye"></i></div>
                <div class="detail-info">
                    <h3>Visibility</h3>
                    <p id="visibility">-- km</p>
                </div>
            </div>
            <div class="detail-card glass-effect">
                <div class="detail-icon"><i class="fas fa-gauge-high"></i></div>
                <div class="detail-info">
                    <h3>Pressure</h3>
                    <p id="pressure">---- hPa</p>
                </div>
            </div>
            <div class="detail-card glass-effect">
                <div class="detail-icon"><i class="fas fa-sun"></i></div>
                <div class="detail-info">
                    <h3>Sunrise</h3>
                    <p id="sunrise">--:-- AM</p>
                </div>
            </div>
            <div class="detail-card glass-effect">
                <div class="detail-icon"><i class="fas fa-moon"></i></div>
                <div class="detail-info">
                    <h3>Sunset</h3>
                    <p id="sunset">--:-- PM</p>
                </div>
            </div>
        </section>

        <!-- Hourly Forecast -->
        <section class="hourly-container fade-in">
            <h2 class="section-title">Hourly Forecast (Next 24h)</h2>
            <div class="hourly-scroll" id="hourlyList">
                <!-- Hourly items will be injected here -->
            </div>
        </section>

        <!-- 5-Day Forecast -->
        <section class="forecast-container fade-in">
            <h2 class="section-title">5-Day Forecast</h2>
            <div class="forecast-row" id="forecastList">
                <!-- 5 forecast cards will be injected here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2025 SkyCheck | Powered by OpenWeatherMap</p>
    </footer>

    <!-- Controls (Bonus) -->
    <div class="controls">
        <button id="soundBtn" class="control-btn sound-btn" title="Toggle Rain Sound">
            <i class="fas fa-volume-mute"></i>
        </button>
    </div>

    <!-- Rain Audio (Placeholder source) -->
    <audio id="rainSource" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2432/2432-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- JavaScript Components -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
